<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado del Reporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Resultado del Reporte</h2>

    <a href="/reportes" class="btn btn-secondary mb-3">Nuevo Filtro</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Producto</th>
                <th>Sucursal</th>
                <th>Tipo</th>
                <th>Cantidad</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="mov : ${movimientos}">
                <td th:text="${mov.inventario.producto.nombre}"></td>
                <td th:text="${mov.inventario.sucursal.nombre}"></td>
                <td th:text="${mov.tipo}"></td>
                <td th:text="${mov.cantidad}"></td>
                <td th:text="${mov.fecha}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
