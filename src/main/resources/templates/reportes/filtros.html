<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Generar Reporte de Movimientos</h2>

    <form action="/reportes/resultado" method="get">
        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select class="form-select" name="productoId">
                <option value="">Todos</option>
                <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Sucursal</label>
            <select class="form-select" name="sucursalId">
                <option value="">Todas</option>
                <option th:each="s : ${sucursales}" th:value="${s.id}" th:text="${s.nombre}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Generar Reporte</button>
    </form>
</div>
</body>
</html>
