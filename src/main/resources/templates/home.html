<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-5">Sistema de Gestión de Inventario</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Categorías</h5>
                <a href="/categorias" class="btn btn-outline-primary">Ir a Categorías</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Productos</h5>
                <a href="/productos" class="btn btn-outline-primary">Ir a Productos</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Sucursales</h5>
                <a href="/sucursales" class="btn btn-outline-primary">Ir a Sucursales</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Inventario</h5>
                <a href="/inventario" class="btn btn-outline-primary">Ir a Inventario</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Movimientos</h5>
                <a href="/movimientos" class="btn btn-outline-primary">Ir a Movimientos</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Alertas de Stock</h5>
                <a href="/alertas" class="btn btn-outline-danger">Ver Alertas</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Reportes</h5>
                <a href="/reportes" class="btn btn-outline-secondary">Generar Reporte</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
