<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Movimientos de Inventario</h2>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <a href="/movimientos/nuevo" class="btn btn-primary mb-3">Nuevo Movimiento</a>
    <a href="/movimientos/exportar" class="btn btn-success mb-3">Exportar a CSV</a>
    
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Sucursal</th>
                <th>Tipo</th>
                <th>Cantidad</th>
                <th>Fecha</th>
                <th>Observación</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="mov : ${movimientos}">
                <td th:text="${mov.id}"></td>
                <td th:text="${mov.inventario.producto.nombre}"></td>
                <td th:text="${mov.inventario.sucursal.nombre}"></td>
                <td th:text="${mov.tipo}"></td>
                <td th:text="${mov.cantidad}"></td>
                <td th:text="${mov.fecha}"></td>
                <td th:text="${mov.observacion}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
