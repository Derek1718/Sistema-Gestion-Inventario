<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Gestión de Categorías</h2>

    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <a href="/categorias/nueva" class="btn btn-primary mb-3">Nueva Categoría</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="categoria : ${categorias}">
                <td th:text="${categoria.id}"></td>
                <td th:text="${categoria.nombre}"></td>
                <td th:text="${categoria.descripcion}"></td>
                <td>
                    <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}" 
                       class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Está seguro de eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
