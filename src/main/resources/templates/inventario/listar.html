<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Control de Inventario</h2>

    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <a href="/inventario/nuevo" class="btn btn-primary mb-3">Nuevo Registro</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Sucursal</th>
                <th>Stock Actual</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="inv : ${inventarios}">
                <td th:text="${inv.id}"></td>
                <td th:text="${inv.producto.nombre}"></td>
                <td th:text="${inv.sucursal.nombre}"></td>
                <td th:text="${inv.stockActual}"></td>
                <td>
                    <a th:href="@{/inventario/eliminar/{id}(id=${inv.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Está seguro de eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
