<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Nuevo Registro de Inventario</h2>

    <form th:action="@{/inventario/guardar}" th:object="${inventario}" method="post">

        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select class="form-select" th:field="*{producto.id}">
                <option value="">Seleccione un producto</option>
                <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Sucursal</label>
            <select class="form-select" th:field="*{sucursal.id}">
                <option value="">Seleccione una sucursal</option>
                <option th:each="s : ${sucursales}" th:value="${s.id}" th:text="${s.nombre}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock Actual</label>
            <input type="number" class="form-control" th:field="*{stockActual}">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/inventario" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
