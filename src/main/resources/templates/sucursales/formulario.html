<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Sucursal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${sucursal.id} ? 'Editar Sucursal' : 'Nueva Sucursal'"></h2>

    <form th:action="@{/sucursales/guardar}" th:object="${sucursal}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}">
            <span class="text-danger" th:if="${#fields.hasErrors('nombre')}"
                  th:errors="*{nombre}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" th:field="*{direccion}">
            <span class="text-danger" th:if="${#fields.hasErrors('direccion')}"
                  th:errors="*{direccion}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" th:field="*{telefono}">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/sucursales" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
