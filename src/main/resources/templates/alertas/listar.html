<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alertas de Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Alertas de Stock Bajo</h2>

    <div th:if="${#lists.isEmpty(alertas)}" class="alert alert-success">
        No hay productos con stock bajo.
    </div>

    <table th:if="${not #lists.isEmpty(alertas)}" class="table table-bordered table-striped">
        <thead class="table-danger">
            <tr>
                <th>Producto</th>
                <th>Sucursal</th>
                <th>Stock Actual</th>
                <th>Stock Mínimo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="alerta : ${alertas}">
                <td th:text="${alerta.producto.nombre}"></td>
                <td th:text="${alerta.sucursal.nombre}"></td>
                <td th:text="${alerta.stockActual}"></td>
                <td th:text="${alerta.producto.stockMinimo}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
